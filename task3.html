<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Message Manager</title>
    <link rel="stylesheet" href="task3.css">
</head>
<body>

    <div class="container">
        <h1>Message Manager</h1>

        <input type="text" id="messageInput" placeholder="Enter a message">

        <p id="charCount">Character Count: 0</p>

        <button id="addBtn">Add Message</button>
        <button id="clearBtn">Clear All Messages</button>

        <p id="status"></p>

        <div id="messageSection">
            <h3>Messages</h3>
        </div>
    </div>

    <script src="task3.js"></script>

</body>
</html>
